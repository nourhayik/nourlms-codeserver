<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>NourLMS — Sign in</title>
	<style>
		:root {
			--bg-deep: #12141a;
			--bg-panel: rgba(28, 32, 42, 0.72);
			--border: rgba(255, 255, 255, 0.08);
			--text: #e8eaed;
			--text-muted: #9aa0a8;
			--accent: #2b8cee;
			--accent-dim: rgba(43, 140, 238, 0.22);
			--accent-bright: #5ba8f5;
			--accent-deep: #1e74d4;
			--input-bg: rgba(0, 0, 0, 0.35);
			--error-bg: rgba(127, 29, 29, 0.35);
			--error-border: rgba(248, 113, 113, 0.35);
			--error-text: #fca5a5;
			--radius-lg: 16px;
			--radius-md: 10px;
			--shadow: 0 24px 80px rgba(0, 0, 0, 0.55), 0 0 0 1px var(--border);
		}
		*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
		body {
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
			background-color: var(--bg-deep);
			color: var(--text);
			min-height: 100vh;
			display: flex;
			align-items: stretch;
			justify-content: center;
		}
		.page-bg {
			position: fixed;
			inset: 0;
			z-index: 0;
			background:
				radial-gradient(ellipse 100% 80% at 15% 20%, rgba(43, 140, 238, 0.2), transparent 50%),
				radial-gradient(ellipse 80% 60% at 85% 75%, rgba(43, 140, 238, 0.1), transparent 45%),
				radial-gradient(ellipse 60% 40% at 50% 100%, rgba(30, 116, 212, 0.12), transparent 55%),
				var(--bg-deep);
		}
		.page-bg::after {
			content: '';
			position: absolute;
			inset: 0;
			background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
				linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
			background-size: 48px 48px;
			mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, black, transparent);
			pointer-events: none;
		}
		.shell {
			position: relative;
			z-index: 1;
			display: flex;
			width: 100%;
			max-width: 1040px;
			min-height: 100vh;
			align-items: center;
			padding: 32px 24px;
			gap: 48px;
		}
		.brand {
			flex: 1;
			display: flex;
			flex-direction: column;
			justify-content: center;
			gap: 20px;
			padding: 16px 8px;
			max-width: 420px;
		}
		.brand-logo-wrap {
			display: flex;
			align-items: center;
			justify-content: flex-start;
			padding: 20px 22px;
			border-radius: var(--radius-lg);
			background: linear-gradient(145deg, rgba(43, 140, 238, 0.18) 0%, rgba(43, 140, 238, 0.06) 100%);
			border: 1px solid rgba(43, 140, 238, 0.25);
			max-width: 320px;
		}
		.brand-logo {
			display: block;
			width: 100%;
			max-width: 260px;
			height: auto;
		}
		.brand-tagline {
			font-size: 1.125rem;
			line-height: 1.5;
			color: var(--text-muted);
			font-weight: 400;
			max-width: 340px;
		}
		.brand-badge {
			display: inline-flex;
			align-items: center;
			gap: 8px;
			font-size: 0.8125rem;
			color: var(--text-muted);
			margin-top: 8px;
		}
		.brand-badge span {
			display: inline-block;
			width: 6px;
			height: 6px;
			border-radius: 50%;
			background: var(--accent);
			box-shadow: 0 0 12px var(--accent);
		}
		.panel-wrap {
			flex: 0 1 400px;
			width: 100%;
			display: flex;
			align-items: center;
			justify-content: center;
		}
		.login-container {
			width: 100%;
			max-width: 400px;
			background: var(--bg-panel);
			backdrop-filter: blur(20px);
			-webkit-backdrop-filter: blur(20px);
			border: 1px solid var(--border);
			border-radius: var(--radius-lg);
			padding: 36px 32px 32px;
			box-shadow: var(--shadow);
		}
		.login-header {
			margin-bottom: 28px;
		}
		.login-header h1 {
			font-size: 1.375rem;
			font-weight: 600;
			letter-spacing: -0.02em;
			color: var(--text);
			margin-bottom: 6px;
		}
		.login-header p {
			font-size: 0.875rem;
			color: var(--text-muted);
			line-height: 1.45;
		}
		.form-group {
			margin-bottom: 20px;
		}
		.form-group label {
			display: block;
			font-size: 0.8125rem;
			font-weight: 500;
			color: var(--text-muted);
			margin-bottom: 8px;
		}
		.form-group input {
			width: 100%;
			padding: 12px 14px;
			font-size: 0.9375rem;
			background: var(--input-bg);
			border: 1px solid var(--border);
			border-radius: var(--radius-md);
			color: var(--text);
			outline: none;
			transition: border-color 0.15s ease, box-shadow 0.15s ease;
		}
		.form-group input::placeholder {
			color: rgba(154, 160, 168, 0.65);
		}
		.form-group input:hover {
			border-color: rgba(255, 255, 255, 0.14);
		}
		.form-group input:focus {
			border-color: var(--accent);
			box-shadow: 0 0 0 3px var(--accent-dim);
		}
		.login-button {
			width: 100%;
			padding: 12px 16px;
			font-size: 0.9375rem;
			font-weight: 600;
			background: linear-gradient(180deg, var(--accent-bright) 0%, var(--accent) 45%, var(--accent-deep) 100%);
			color: #ffffff;
			border: none;
			border-radius: var(--radius-md);
			cursor: pointer;
			transition: filter 0.15s ease, transform 0.1s ease;
			margin-top: 4px;
		}
		.login-button:hover:not(:disabled) {
			filter: brightness(1.06);
		}
		.login-button:active:not(:disabled) {
			transform: translateY(1px);
		}
		.login-button:disabled {
			background: rgba(255, 255, 255, 0.08);
			color: var(--text-muted);
			cursor: not-allowed;
		}
		.error-message {
			background: var(--error-bg);
			border: 1px solid var(--error-border);
			border-radius: var(--radius-md);
			padding: 12px 14px;
			margin-bottom: 20px;
			font-size: 0.8125rem;
			color: var(--error-text);
			line-height: 1.45;
			display: none;
		}
		.error-message.visible { display: block; }
		@media (max-width: 880px) {
			.shell {
				flex-direction: column;
				align-items: center;
				padding-top: 40px;
				padding-bottom: 48px;
			}
			.brand {
				align-items: center;
				text-align: center;
				max-width: 100%;
			}
			.brand-tagline { max-width: 420px; }
			.brand-logo-wrap {
				justify-content: center;
				max-width: 100%;
			}
			.brand-logo { max-width: 220px; }
			.panel-wrap { flex: 1; width: 100%; }
		}
	</style>
</head>
<body>
	<div class="page-bg" aria-hidden="true"></div>
	<div class="shell">
		<div class="brand">
			<div class="brand-logo-wrap">
				<img class="brand-logo" src="/nourlms-login-logo.png" width="260" alt="NourLMS Code Server">
			</div>
			<p class="brand-tagline">Sign in with your NourLMS account to open your cloud workspace and continue where you left off.</p>
			<p class="brand-badge"><span></span> Secure session</p>
		</div>
		<div class="panel-wrap">
			<div class="login-container">
				<div class="login-header">
					<h1>Welcome back</h1>
					<p>Enter your phone number and password to continue.</p>
				</div>
				<div class="error-message" id="error"></div>
				<form id="loginForm" method="POST" action="/nourlms-login">
					<div class="form-group">
						<label for="phone">Phone number</label>
						<input type="tel" id="phone" name="phone" placeholder="+964XXXXXXXXXX" required autocomplete="tel" inputmode="tel">
					</div>
					<div class="form-group">
						<label for="password">Password</label>
						<input type="password" id="password" name="password" placeholder="Your password" required autocomplete="current-password">
					</div>
					<button type="submit" class="login-button" id="submitBtn">Sign in</button>
				</form>
			</div>
		</div>
	</div>
	<script>
		(function () {
			var params = new URLSearchParams(window.location.search);
			var errorParam = params.get('error');
			var errorEl = document.getElementById('error');
			if (errorParam && errorEl) {
				errorEl.textContent = decodeURIComponent(errorParam);
				errorEl.classList.add('visible');
			}
			var form = document.getElementById('loginForm');
			var btn = document.getElementById('submitBtn');
			form.addEventListener('submit', function () {
				btn.disabled = true;
				btn.textContent = 'Signing in…';
			});
		})();
	</script>
</body>
</html>
